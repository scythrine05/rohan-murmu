<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="stylesheet" href="./style.css" type="text/css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rohan Murmu</title>
  </head>
  <div style="overflow-x: hidden; position: relative">
    <body>
      <!-- Landing Section -->
      <div class="landing-container">
        <div class="landing-text" data-fill="HEY">HEY</div>
        <div class="landing-text" data-fill="THIS IS">THIS IS</div>
        <div class="landing-text" data-fill="ROHAN">ROHAN</div>
        <div class="landing-text" data-fill="MURMU">MURMU</div>
      </div>

      <section class="spacer">
        <h1 id="scrollingText">
          FRONTEND BACKEND MOBILE DEVELOPMENT UI/UX DESIGNER
        </h1>
      </section>

      <div class="scroller">
        <div class="about-container left">
          <div class="panel first">
            FRONTEND BACKEND MOBILE DEVELOPMENT UI/UX
          </div>
          <div class="panel second">
            FRONTEND BACKEND MOBILE DEVELOPMENT UI/UX
          </div>
        </div>
      </div>
      <div class="cards">
        <div class="card card-1"><h2>01</h2></div>
        <div class="card card-2"><h2>02</h2></div>
        <div class="card card-3"><h2>03</h2></div>
      </div>
      <footer>
        <section id="contact">
          <div class="contact-box">
            <div class="contact-links">
              <h2 class="contact-title">CONTACT</h2>
              <div class="links">
                <div class="link">
                  <a
                    ><img
                      src="https://i.postimg.cc/m2mg2Hjm/linkedin.png"
                      alt="linkedin"
                  /></a>
                </div>
                <div class="link">
                  <a
                    ><img
                      src="https://i.postimg.cc/YCV2QBJg/github.png"
                      alt="github"
                  /></a>
                </div>
                <div class="link">
                  <a
                    ><img
                      src="https://i.postimg.cc/W4Znvrry/codepen.png"
                      alt="codepen"
                  /></a>
                </div>
                <div class="link">
                  <a
                    ><img
                      src="https://i.postimg.cc/NjLfyjPB/email.png"
                      alt="email"
                  /></a>
                </div>
              </div>
            </div>
            <div class="contact-form-wrapper">
              <form>
                <div class="form-item">
                  <input type="text" name="sender" required />
                  <label>Name:</label>
                </div>
                <div class="form-item">
                  <input type="text" name="email" required />
                  <label>Email:</label>
                </div>
                <div class="form-item">
                  <textarea class="" name="message" required></textarea>
                  <label>Message:</label>
                </div>
                <button class="submit-btn">Send</button>
              </form>
            </div>
          </div>
        </section>
      </footer>

      <!-- Loading Screen -->

      <div class="loading-screen">
        <div class="loader">
          <div class="loader-1 bar"></div>
          <div class="loader-2 bar"></div>
        </div>
      </div>
      <div class="counter">
        <div class="counter-1 digit">
          <div class="num">0</div>
          <div class="num num1offset1">1</div>
        </div>
        <div class="counter-2 digit">
          <div class="num">0</div>
          <div class="num num1offset2">1</div>
          <div class="num">2</div>
          <div class="num">3</div>
          <div class="num">4</div>
          <div class="num">5</div>
          <div class="num">6</div>
          <div class="num">7</div>
          <div class="num">8</div>
          <div class="num">9</div>
          <div class="num">0</div>
        </div>
        <div class="counter-3 digit">
          <div class="num">0</div>
          <div class="num">1</div>
          <div class="num">2</div>
          <div class="num">3</div>
          <div class="num">4</div>
          <div class="num">5</div>
          <div class="num">6</div>
          <div class="num">7</div>
          <div class="num">8</div>
          <div class="num">9</div>
        </div>
      </div>
      <script type="module" src="/main.js"></script>
    </body>
  </div>
</html>
